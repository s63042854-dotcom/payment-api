<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدفع</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { background: #1a1a2e; padding: 30px; border-radius: 16px; max-width: 400px; width: 100%; color: #fff; border: 1px solid #333; }
    h2 { color: #6b9aff; margin-bottom: 20px; text-align: center; }
    label { display: block; margin: 10px 0 5px; color: #aaa; }
    input { width: 100%; padding: 12px; background: #0b0b1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
    #card-element { background: #0b0b1a; padding: 12px; border-radius: 8px; border: 1px solid #333; margin: 10px 0; }
    button { width: 100%; padding: 14px; background: #2d6eff; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:hover { background: #1a4fcf; }
    #status { margin-top: 15px; padding: 12px; background: #0b0b1a; border-radius: 8px; text-align: center; color: #aaa; }
    .fee-note { font-size: 12px; color: #667; text-align: center; margin-top: 15px; border-top: 1px solid #1a253a; padding-top: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h2>💳 بوابة الدفع</h2>
  <label>💰 المبلغ (يورو)</label>
  <input type="number" id="amount" value="10" step="1" min="1">
  <label>💳 بيانات البطاقة</label>
  <div id="card-element"></div>
  <button id="payBtn">دفع الآن</button>
  <div id="status">🟢 أدخل بيانات بطاقتك</div>
  <div class="fee-note">* سيتم خصم رسوم Stripe (2.9% + 0.30€) قبل وصول المبلغ للحساب البنكي.</div>
</div>
<script>
const stripe = Stripe('pk_live_...'); // ⚠️ ضع المفتاح العام هنا (pk_live_...)
const elements = stripe.elements();
const cardElement = elements.create('card');
cardElement.mount('#card-element');

document.getElementById('payBtn').addEventListener('click', async () => {
  const status = document.getElementById('status');
  const amount = document.getElementById('amount').value;
  if (!amount || amount <= 0) { status.innerHTML = '❌ أدخل مبلغاً صحيحاً.'; return; }
  status.innerHTML = '⏳ جاري المعالجة...';
  document.getElementById('payBtn').disabled = true;

  try {
    const { paymentMethod, error } = await stripe.createPaymentMethod({
      type: 'card',
      card: cardElement,
    });
    if (error) { status.innerHTML = '❌ ' + error.message; document.getElementById('payBtn').disabled = false; return; }

    const response = await fetch('/api/create-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: amount, paymentMethodId: paymentMethod.id }),
    });
    const data = await response.json();
    if (data.success) {
      status.innerHTML = '✅ ' + data.message;
      status.style.color = '#a5d6a7';
    } else {
      status.innerHTML = '❌ ' + data.error;
      status.style.color = '#ff8a80';
    }
  } catch (err) {
    status.innerHTML = '❌ خطأ في الاتصال: ' + err.message;
  }
  document.getElementById('payBtn').disabled = false;
});
</script>
</body>
</html>
